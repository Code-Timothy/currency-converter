<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="images/share.png">
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/container.css">
    <link rel="stylesheet" href="css/background.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="script.js"></script>
    <title>Kalkulator Walut</title>
</head>

<body>
    <div class="container">
        <form class="form js-form">
            <fieldset class="form__fieldset">
                <legend class="form__legend">Gwiezdny Kantor</legend>
                <p class="form__paragraph">
                    <label for="amount" class="form__label">Kwota w PLN:</label>
                    <input class="form__input js-amount" id="amount" type="number" step="0.1" min="1">
                </p>
                <p class="form__paragraph">
                    <label for="select" class="form__label">Wybierz walutę:</label>
                    <select id="select" name="currencies" class="form__select js-select">
                        <option value="EUR">Euro</option>
                        <option value="GBP">Funt Brytyjski</option>
                        <option value="USD">Dolar Amerykański</option>
                        <option value="CHF">Frank Szwajcarski</option>
                    </select>
                </p>
                <p class="form__paragraph">
                    <button class="form__button">PRZELICZ</button>
                </p>
                <p class="form__paragraph">
                    <strong class="form__result js-result"></strong>
                </p>
                <p class="form__paragraph">
                    <strong class="form__info">Kursy pochodzą ze strony Narodowego Banku Polskiego z dnia
                        08.03.2024.</strong>
                </p>
            </fieldset>
        </form>
    </div>

    <!--Poniższa sekcja odpowiada za background animation effect-->

    <section>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </section>
</body>

</html>
